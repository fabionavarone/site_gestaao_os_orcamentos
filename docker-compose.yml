name: provisao-manager

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: provisao
      POSTGRES_USER: provisao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-in-.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provisao -d provisao"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks: [internal]

  api:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: .env
    command: ["uvicorn", "provisao_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - uploads_data:/var/lib/provisao/uploads
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5
    networks: [internal]

  worker:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: .env
    command: ["python", "-m", "provisao_api.worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.75
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    internal: true
