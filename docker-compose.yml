name: provisao-manager

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: provisao
      POSTGRES_USER: provisao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-in-.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provisao -d provisao"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks: [internal]

  migrate:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: ${ENV_FILE:-.env}
    command: ["alembic", "-c", "/srv/provisao/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"
    mem_limit: 512m
    cpus: 0.5
    networks: [internal]

  api:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: ${ENV_FILE:-.env}
    command: ["uvicorn", "provisao_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    volumes:
      - uploads_data:/var/lib/provisao/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5
    networks: [internal]

  inbox-worker:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: ${ENV_FILE:-.env}
    command: ["python", "-m", "provisao_api.worker"]
    environment: { WORKER_KIND: inbox }
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.75
    networks: [internal]
    volumes:
      - uploads_data:/var/lib/provisao/uploads

  outbox-worker:
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: ${ENV_FILE:-.env}
    command: ["python", "-m", "provisao_api.worker"]
    environment: { WORKER_KIND: outbox }
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    volumes:
      - uploads_data:/var/lib/provisao/uploads
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks: [internal]

  polling-worker:
    profiles: [polling]
    build: { context: ., dockerfile: infra/api.Dockerfile }
    env_file: ${ENV_FILE:-.env}
    command: ["python", "-m", "provisao_api.worker"]
    environment: { WORKER_KIND: polling }
    depends_on:
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.25
    networks: [internal]

  frontend:
    build: { context: ., dockerfile: infra/web.Dockerfile }
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${PROVISAO_HTTP_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api: { condition: service_healthy }
      frontend: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    internal: true
